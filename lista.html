<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - Turma 2A IFRO 💚</title>
  <link rel="icon" href="https://wiki.ifro.edu.br/media/img_empresa/logo-IFRO-horizontal_1_F3hUyPz.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #0a0a0a;
      color: #00ff66;
      overflow-x: hidden;
      text-align: center;
    }

    /* ====== Cabeçalho Padrão Oficial ====== */
    header {
      background: linear-gradient(90deg, #001900, #003300);
      color: #00ff66;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      box-shadow: 0 2px 10px #00ff66;
      position: relative;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 900px;
    }

    .logo {
      width: 160px;
      background-color: white;
      padding: 6px;
      border-radius: 8px;
      box-shadow: 0 0 15px #00ff66;
      transition: transform 0.3s ease;
    }

    nav {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    nav a {
      text-decoration: none;
      color: #00ff66;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover { color: white; }

    .menu-btn {
      background: none;
      border: 2px solid #00ff66;
      color: #00ff66;
      font-size: 26px;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      display: none;
    }

    @media (max-width: 750px) {
      nav {
        display: none;
        flex-direction: column;
        background: rgba(0, 25, 0, 0.95);
        position: absolute;
        top: 80px;
        right: 10px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 20px #00ff66;
        z-index: 100;
      }
      nav.show { display: flex; }
      .menu-btn { display: block; }
    }

    /* ====== Container de Usuários ====== */
    main { padding: 40px 20px; }

    h2 {
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff66;
    }

    .usuarios-container {
      margin: 0 auto;
      max-width: 700px;
      background: linear-gradient(145deg, #001900, #050505);
      border: 2px solid #00ff66;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0, 255, 102, 0.3);
    }

    .usuario {
      border-bottom: 1px solid rgba(0, 255, 102, 0.2);
      padding: 20px;
      text-align: left;
      transition: 0.3s;
    }

    .usuario:hover {
      background: rgba(0, 255, 102, 0.05);
    }

    .usuario:last-child {
      border-bottom: none;
    }

    .usuario strong {
      color: #fff;
      font-size: 1.1em;
      text-shadow: 0 0 5px #00ff66;
    }

    .info-label {
      color: #00ff66;
      font-size: 0.9em;
      opacity: 0.8;
    }

    footer {
      background: #001900;
      color: #00ff66;
      padding: 20px;
      margin-top: 50px;
      box-shadow: 0 -2px 10px #00ff66;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="https://wiki.ifro.edu.br/media/img_empresa/logo-IFRO-horizontal_1_F3hUyPz.png" alt="Logo IFRO" class="logo">
      <button class="menu-btn" id="menuBtn">☰</button>
    </div>
    <nav id="navMenu">
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="vendas.html">Loja</a>
      <a href="usuarios.html" style="color: white;">Usuários</a>
      <a href="comentarios.html">Comentários</a>
    </nav>
  </header>

  <main>
    <h2>👥 Usuários Registrados - Turma 2°A</h2>
    
    <div class="usuarios-container" id="usuariosContainer">
      <p>Buscando dados no servidor...</p>
    </div>
  </main>

  <footer>
    <p>© 2026 Turma 2ªA – Instituto Federal de Rondônia | Sistema de Gestão 💚</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDP25sq9YORCe7x2FZalP_miA9bsQqDUU",
      authDomain: "turma-1a-ifro.firebaseapp.com",
      projectId: "turma-1a-ifro",
      storageBucket: "turma-1a-ifro.firebasestorage.app",
      messagingSenderId: "237008011343",
      appId: "1:237008011343:web:075686ab6eff1d327eaa3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById("usuariosContainer");
    const menuBtn = document.getElementById("menuBtn");
    const navMenu = document.getElementById("navMenu");

    // Toggle Menu
    menuBtn.onclick = () => navMenu.classList.toggle("show");

    async function carregarUsuarios() {
      try {
        const q = query(collection(db, "usuarios"), orderBy("criadoEm", "desc"));
        const querySnapshot = await getDocs(q);

        container.innerHTML = "";
        querySnapshot.forEach((doc) => {
          const u = doc.data();
          const data = u.criadoEm ? new Date(u.criadoEm.seconds * 1000).toLocaleString() : "(sem data)";
          
          const div = document.createElement("div");
          div.className = "usuario";
          div.innerHTML = `
            <strong>${u.nome}</strong><br>
            <span class="info-label">📧 E-mail:</span> ${u.email}<br>
            <span class="info-label">🏫 Turma:</span> ${u.turma}<br>
            <span class="info-label">⏰ Cadastro:</span> ${data}
          `;
          container.appendChild(div);
        });

        if (querySnapshot.empty) {
          container.innerHTML = "<p>Nenhum usuário encontrado no banco de dados.</p>";
        }
      } catch (error) {
        console.error("Erro ao carregar:", error);
        container.innerHTML = "<p style='color: #ff5722;'>Erro ao conectar com o banco de dados.</p>";
      }
    }

    carregarUsuarios();
  </script>
</body>
</html>
